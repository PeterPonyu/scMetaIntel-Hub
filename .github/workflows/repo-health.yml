name: repo-health

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package metadata
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps

      - name: Syntax sweep
        run: python -m compileall scmetaintel geodh benchmarks scripts tests

      - name: Repository health tests
        run: python -m unittest discover -s tests -p 'test_repository_health.py' -v
